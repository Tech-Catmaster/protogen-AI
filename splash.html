<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Protogen AI — Bingo</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #000008;
            --text: #fff;
            --muted: rgba(255, 255, 255, 0.5);
            --dim: rgba(255, 255, 255, 0.28);
            --accent: #5b5ef4;
            --accent2: #c084fc;
            --pink: #f472b6;
            --teal: #2dd4bf;
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.11);
            --glow: rgba(91, 94, 244, 0.55);
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: Inter, system-ui, sans-serif;
            user-select: none;
        }

        /* ── ANIMATED BACKGROUND ── */
        #bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.22;
        }

        .orb1 {
            width: 600px;
            height: 600px;
            background: radial-gradient(#5b5ef4, transparent);
            top: -150px;
            left: -150px;
            animation: o1 22s ease-in-out infinite;
        }

        .orb2 {
            width: 500px;
            height: 500px;
            background: radial-gradient(#c084fc, transparent);
            bottom: -100px;
            right: -100px;
            animation: o2 28s ease-in-out infinite;
        }

        .orb3 {
            width: 350px;
            height: 350px;
            background: radial-gradient(#2dd4bf, transparent);
            top: 40%;
            left: 55%;
            animation: o3 18s ease-in-out infinite;
        }

        .grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.022) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.022) 1px, transparent 1px);
            background-size: 55px 55px;
        }

        @keyframes o1 {

            0%,
            100% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(60px, 80px)
            }
        }

        @keyframes o2 {

            0%,
            100% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(-60px, -50px)
            }
        }

        @keyframes o3 {

            0%,
            100% {
                transform: translate(0, 0)
            }

            50% {
                transform: translate(-40px, 60px)
            }
        }

        /* ── LOGO / ORB ── */
        #screen {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .logo-outer {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-outer:active {
            transform: scale(0.96);
        }

        .logo-img {
            width: clamp(150px, 36vw, 230px);
            height: clamp(150px, 36vw, 230px);
            border-radius: 50%;
            object-fit: cover;
            display: block;
            filter: drop-shadow(0 0 40px rgba(91, 94, 244, 0.6));
            transition: filter 0.5s ease;
            position: relative;
            z-index: 2;
        }

        .logo-outer.idle .logo-img {
            animation: idleFloat 4s ease-in-out infinite;
        }

        .logo-outer.listening .logo-img {
            filter: drop-shadow(0 0 70px rgba(192, 132, 252, 1)) drop-shadow(0 0 140px rgba(91, 94, 244, 0.7));
            animation: listenPulse 0.9s ease-in-out infinite;
        }

        .logo-outer.speaking .logo-img {
            filter: drop-shadow(0 0 60px rgba(45, 212, 191, 0.9)) drop-shadow(0 0 110px rgba(91, 94, 244, 0.6));
            animation: speakBob 0.55s ease-in-out infinite;
        }

        .logo-outer.thinking .logo-img {
            filter: drop-shadow(0 0 50px rgba(244, 114, 182, 0.8)) drop-shadow(0 0 100px rgba(91, 94, 244, 0.5));
            animation: thinkSpin 1.8s linear infinite;
        }

        @keyframes idleFloat {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-12px)
            }
        }

        @keyframes listenPulse {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.07)
            }
        }

        @keyframes speakBob {

            0%,
            100% {
                transform: scale(1) translateY(0)
            }

            30% {
                transform: scale(1.04) translateY(-4px)
            }

            70% {
                transform: scale(0.97) translateY(2px)
            }
        }

        @keyframes thinkSpin {

            0%,
            100% {
                transform: rotate(-2deg) scale(1)
            }

            50% {
                transform: rotate(2deg) scale(1.03)
            }
        }

        /* Pulse rings */
        .ring {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }

        .ring1 {
            border: 1.5px solid rgba(91, 94, 244, 0.35);
            animation: ring1a 3.5s ease-out infinite;
        }

        .ring2 {
            border: 1px solid rgba(192, 132, 252, 0.2);
            animation: ring1a 3.5s ease-out infinite 1.15s;
        }

        .ring3 {
            border: 1px solid rgba(45, 212, 191, 0.15);
            animation: ring1a 3.5s ease-out infinite 2.3s;
        }

        @keyframes ring1a {
            0% {
                width: clamp(150px, 36vw, 230px);
                height: clamp(150px, 36vw, 230px);
                opacity: 0.7;
            }

            100% {
                width: calc(clamp(150px, 36vw, 230px) + 90px);
                height: calc(clamp(150px, 36vw, 230px) + 90px);
                opacity: 0;
            }
        }

        /* ── WAVE BARS ── */
        #waveWrap {
            display: flex;
            gap: 4px;
            align-items: center;
            justify-content: center;
            height: 40px;
            margin-top: 22px;
            opacity: 0;
            transition: opacity 0.35s;
        }

        #waveWrap.on {
            opacity: 1;
        }

        .wb {
            width: 4px;
            border-radius: 3px;
            animation: wbA 0.7s ease-in-out infinite;
        }

        .wb:nth-child(1) {
            height: 8px;
            background: var(--accent);
            animation-delay: 0s;
        }

        .wb:nth-child(2) {
            height: 18px;
            background: var(--accent2);
            animation-delay: .08s;
        }

        .wb:nth-child(3) {
            height: 28px;
            background: var(--pink);
            animation-delay: .16s;
        }

        .wb:nth-child(4) {
            height: 22px;
            background: var(--accent2);
            animation-delay: .12s;
        }

        .wb:nth-child(5) {
            height: 34px;
            background: var(--accent);
            animation-delay: .04s;
        }

        .wb:nth-child(6) {
            height: 20px;
            background: var(--teal);
            animation-delay: .20s;
        }

        .wb:nth-child(7) {
            height: 26px;
            background: var(--accent2);
            animation-delay: .10s;
        }

        .wb:nth-child(8) {
            height: 14px;
            background: var(--accent);
            animation-delay: .18s;
        }

        .wb:nth-child(9) {
            height: 30px;
            background: var(--pink);
            animation-delay: .06s;
        }

        .wb:nth-child(10) {
            height: 16px;
            background: var(--teal);
            animation-delay: .14s;
        }

        @keyframes wbA {

            0%,
            100% {
                transform: scaleY(0.35)
            }

            50% {
                transform: scaleY(2.2)
            }
        }

        /* ── STATUS TEXT ── */
        #statusWrap {
            position: fixed;
            bottom: 14vh;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 11;
            pointer-events: none;
            min-width: 200px;
        }

        #statusMain {
            font-family: Syne, sans-serif;
            font-size: clamp(1rem, 4.5vw, 1.4rem);
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #fff;
            min-height: 1.4em;
            transition: all 0.3s;
        }

        #statusSub {
            font-size: clamp(0.65rem, 2.5vw, 0.8rem);
            color: var(--dim);
            margin-top: 5px;
            letter-spacing: 0.07em;
        }

        /* ── TRANSCRIPT BUBBLE ── */
        #txBox {
            position: fixed;
            top: 7vh;
            left: 50%;
            transform: translateX(-50%);
            max-width: 88vw;
            width: max-content;
            max-width: min(88vw, 520px);
            background: rgba(10, 10, 22, 0.88);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 14px 22px;
            font-size: clamp(0.82rem, 2.8vw, 0.95rem);
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.82);
            font-weight: 300;
            z-index: 11;
            pointer-events: none;
            backdrop-filter: blur(20px);
            opacity: 0;
            transition: opacity 0.4s;
            max-height: 35vh;
            overflow-y: auto;
        }

        #txBox.on {
            opacity: 1;
        }

        #txBox .label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent2);
            margin-bottom: 4px;
        }

        #txBox .bingo-reply {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        #txBox .bingo-label {
            color: var(--teal);
        }

        /* ── WAKE FLASH ── */
        #wakeFlash {
            position: fixed;
            inset: 0;
            z-index: 50;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s;
            background: radial-gradient(circle at center, rgba(91, 94, 244, 0.18) 0%, transparent 65%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Syne, sans-serif;
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--accent2);
            letter-spacing: 0.08em;
        }

        #wakeFlash.on {
            opacity: 1;
        }

        /* ── TOAST ── */
        #toast {
            position: fixed;
            bottom: 5vh;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(20, 20, 35, 0.95);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 10px 22px;
            font-size: 0.82rem;
            color: var(--dim);
            z-index: 60;
            opacity: 0;
            transition: all 0.35s;
            pointer-events: none;
            backdrop-filter: blur(20px);
            white-space: nowrap;
        }

        #toast.on {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── MUSIC MINI PLAYER ── */
        #player {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(8, 8, 20, 0.96);
            border-bottom: 1px solid var(--border);
            padding: 10px 18px;
            z-index: 20;
            transform: translateY(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(30px);
        }

        #player.on {
            transform: translateY(0);
        }

        .pi {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: nowrap;
        }

        .part {
            width: 42px;
            height: 42px;
            min-width: 42px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            animation: partSpin 2s linear infinite;
            animation-play-state: paused;
        }

        #player.on .part {
            animation-play-state: running;
        }

        @keyframes partSpin {
            to {
                filter: hue-rotate(360deg)
            }
        }

        .pinfo {
            flex: 1;
            min-width: 0;
        }

        .ptitle {
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .partist {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 1px;
        }

        .pctrl {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
        }

        .pb {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--glass);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .pb:hover {
            border-color: var(--accent);
            background: rgba(91, 94, 244, 0.25);
        }

        .pb.big {
            width: 40px;
            height: 40px;
            font-size: 1rem;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
        }

        .pprog {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 80px;
        }

        .ptrack {
            flex: 1;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            cursor: pointer;
        }

        .pfill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 2px;
            width: 0%;
            transition: width 0.8s linear;
        }

        .ptime {
            font-size: 0.68rem;
            color: var(--muted);
            white-space: nowrap;
        }

        .pvol {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pvol input {
            width: 65px;
            accent-color: var(--accent);
            cursor: pointer;
            height: 3px;
        }

        /* ── HINT ── */
        #hint {
            position: fixed;
            bottom: 2.5vh;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.68rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.08em;
            z-index: 11;
            pointer-events: none;
            white-space: nowrap;
        }

        @media(max-width:480px) {
            .pvol {
                display: none;
            }

            .pprog {
                min-width: 60px;
            }
        }
    </style>
</head>

<body>

    <!-- BACKGROUND -->
    <div id="bg">
        <div class="grid"></div>
        <div class="orb orb1"></div>
        <div class="orb orb2"></div>
        <div class="orb orb3"></div>
    </div>

    <!-- WAKE FLASH -->
    <div id="wakeFlash">Hey Bingo! 👋</div>

    <!-- TOAST -->
    <div id="toast"></div>

    <!-- MUSIC PLAYER -->
    <div id="player">
        <div class="pi">
            <div class="part">🎵</div>
            <div class="pinfo">
                <div class="ptitle" id="pTitle">—</div>
                <div class="partist" id="pArtist">—</div>
            </div>
            <div class="pctrl">
                <button class="pb" onclick="prevSong()">⏮</button>
                <button class="pb big" id="playBtn" onclick="togglePlay()">▶</button>
                <button class="pb" onclick="nextSong()">⏭</button>
                <button class="pb" onclick="stopMusic()">⏹</button>
            </div>
            <div class="pprog">
                <span class="ptime" id="pCur">0:00</span>
                <div class="ptrack" id="ptrack" onclick="seekSong(event)">
                    <div class="pfill" id="pfill"></div>
                </div>
                <span class="ptime" id="pTot">0:00</span>
            </div>
            <div class="pvol">🔊<input type="range" min="0" max="1" step="0.05" value="0.8" id="volSlider"
                    oninput="setVol(this.value)"></div>
        </div>
    </div>

    <!-- TRANSCRIPT -->
    <div id="txBox">
        <div class="label" id="txYouLabel">YOU SAID</div>
        <div id="txYou"></div>
        <div class="bingo-reply" id="txReplyWrap" style="display:none">
            <div class="label bingo-label">BINGO</div>
            <div id="txReply"></div>
        </div>
    </div>

            wake: null,       // continuous wake-word recogniser

            // Stop everything cleanly before doing anything else
            stopAll() {
                try { if (this.wake) { this.wake.abort(); this.wake = null; } } catch (e) { }
                try { if (this.chat) { this.chat.abort(); this.chat = null; } } catch (e) { }
                this.chatActive = false;
                this.wakeActive = false;
            },

            startWake() {
                if (this.chatActive) return;          // don't wake if already taking input
                if (this.wakeActive) return;          // already running
                if (!window.SpeechRecognition && !window.webkitSpeechRecognition) return;

                this.stopAll();
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                this.wake = new SR();
                this.wake.continuous = true;
                this.wake.interimResults = true;
                this.wake.lang = 'en-US';
                this.wakeActive = true;

                this.wake.onresult = (e) => {
                    let txt = '';
                    for (let i = e.resultIndex; i < e.results.length; i++)
                        txt += e.results[i][0].transcript.toLowerCase();

                    if (/(hey bingo|bingo|hey protogen|protogen)/.test(txt)) {
                        this.stopAll();
                        flashWake();
                        setLogo('listening');
                        setStatus('Hey! Listening...', '');
                        waveOn(true);
                        setTimeout(() => this.startChat(), 350);
                    }
                };
                this.wake.onerror = (e) => {
                    this.wakeActive = false;
                    // aborted / no-speech are harmless — just restart
                    if (e.error === 'aborted' || e.error === 'no-speech') {
                        setTimeout(() => this.startWake(), 1500);
                    }
                };
                this.wake.onend = () => {
                    this.wakeActive = false;
                    if (!this.chatActive) {
                        setTimeout(() => this.startWake(), 1200);
                    }
                };

                try { this.wake.start(); }
                catch (e) { this.wakeActive = false; setTimeout(() => this.startWake(), 2000); }
            },

            startChat() {
                if (this.chatActive) return;
                this.stopAll();

                if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
                    speakText("Sorry, voice input needs Chrome or Edge."); return;
                }
                const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
                this.chat = new SR();
                this.chat.continuous = false;
                this.chat.interimResults = true;
                this.chat.lang = activeLang === 'fr-FR' ? 'fr-FR'
                    : activeLang === 'es-ES' ? 'es-ES'

                this.finalText = '';

                setLogo('listening');
                waveOn(true);
                setStatus('Listening...', 'Speak now');

                this.chat.onresult = (e) => {
                    let interim = '', fin = '';
                    for (let i = e.resultIndex; i < e.results.length; i++) {
                        if (e.results[i].isFinal) fin += e.results[i][0].transcript;
                        else interim += e.results[i][0].transcript;
                    }
                    const shown = fin || interim;
                    if (shown) setStatus(shown, '');
                    if (fin) this.finalText = fin.trim();

                this.chat.onerror = (e) => {

                    if (e.error !== 'no-speech' && e.error !== 'aborted') {
                        toast('Mic error: ' + e.error);

                    this.chatActive = false;
                };

                this.chat.onend = () => {
                    this.chatActive = false;
                    this.chat = null;
                    if (this.finalText) {
                        processInput(this.finalText);
                        this.finalText = '';
                    } else {

                        waveOn(false);
                        setStatus('Hey Bingo', 'Tap orb · Say "Hey Bingo"');
                        // Resume wake word after a short pause
                        setTimeout(() => this.startWake(), 600);

                };

                try { this.chat.start(); }
                catch (e) {
                    this.chatActive = false;
                    toast('Could not start mic. Tap orb to try again.');
                    setTimeout(() => this.startWake(), 1000);
                }

        // SPEECH SYNTHESIS — human-like

        let ttsQueue = [], ttsBusy = false;

        function speakText(text, opts = {}) {
            if (!window.speechSynthesis) return;
            const clean = text
                .replace(/<[^>]+>/g, '')
                .replace(/[🎵🎤🕐😄❓ℹ️💡🗑️🔇⏮⏭⏹▶⏸🔮🎯⚡★•🌍📐🔢⏰🌤️🎙️👋😂🤣💀🤦🙄]/gu, '')
                .replace(/\*\*/g, '')
                .trim();
            if (!clean) return;
            ttsQueue.push({ text: clean, ...opts });
            if (!ttsBusy) drainTTS();
        }

        function drainTTS() {
            if (!ttsQueue.length) { ttsBusy = false; return; }
            ttsBusy = true;
            const item = ttsQueue.shift();
            const utt = new SpeechSynthesisUtterance(item.text);
            const voices = window.speechSynthesis.getVoices();
            const g = item.forceGender || voiceGender;
            const lang = item.lang || activeLang;

            utt.rate = 0.87 + Math.random() * 0.1;
            utt.volume = 0.95;
            utt.pitch = 1.0;

            if (lang === 'fr-FR') {
                const v = voices.find(v => /fr[-_]|french/i.test(v.lang + v.name));
                if (v) { utt.voice = v; utt.lang = 'fr-FR'; }
            } else if (lang === 'es-ES') {
                const v = voices.find(v => /es[-_]|spanish/i.test(v.lang + v.name));
                if (v) { utt.voice = v; utt.lang = 'es-ES'; }
            } else if (lang === 'zh-CN') {
                const v = voices.find(v => /zh[-_]|chinese|mandarin/i.test(v.lang + v.name));
                if (v) { utt.voice = v; utt.lang = 'zh-CN'; }
            } else {
                if (g === 'female') {
                    utt.pitch = 1.12;
                    const v = voices.find(v =>
                        /samantha|zira|karen|victoria|moira|tessa|fiona|ava|allison|joanna|kendra|kimberly|salli|nicole|google uk english female/i.test(v.name));
                    if (v) utt.voice = v;
                } else if (g === 'male') {
                    utt.pitch = 0.9;
                    const v = voices.find(v =>
                        /daniel|alex|fred|thomas|james|david|mark|oliver|george|google uk english male|matthew|justin/i.test(v.name));
                    if (v) utt.voice = v;
                }
            }

            setLogo('speaking'); waveOn(true);

            utt.onstart = () => {
                setStatus('Bingo is speaking', '');
            };
            utt.onend = () => {
                ttsBusy = false;
                if (!ttsQueue.length) {
                    setLogo('idle'); waveOn(false);
                    setStatus('Hey Bingo', 'Tap orb · Say "Hey Bingo"');
                    // Resume wake-word detection after speaking
                    setTimeout(() => VR.startWake(), 700);
                }
                drainTTS();
            };
            utt.onerror = () => { ttsBusy = false; drainTTS(); };

            window.speechSynthesis.speak(utt);
        }

        function stopSpeak() {
            window.speechSynthesis.cancel();
            ttsQueue = []; ttsBusy = false;

        // ═══════════════════════════════════════════════════════════
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            gainNode = audioCtx.createGain();
            gainNode.gain.value = vol;
            gainNode.connect(audioCtx.destination);
        }
        function tone(freq, dur, type = 'sine') {
            try {
                initAudio();
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.type = type; o.frequency.value = freq;
                g.gain.setValueAtTime(0.055, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
                o.start(); o.stop(audioCtx.currentTime + dur);
            } catch (e) { }
        }
        function startChord() {
            tone(523, 0.4);
            setTimeout(() => tone(659, 0.4), 130);
            setTimeout(() => tone(784, 0.5), 260);
            setTimeout(() => tone(1047, 0.35), 390);
        }

        function playSong(idx) {
            if (idx < 0 || idx >= SONGS.length) return;
            curSong = idx;
            const s = SONGS[idx];
            playing = true; songPos = 0;
            songDur = 170 + Math.floor(Math.random() * 120);
            clearInterval(progTmr);
            progTmr = setInterval(tickSong, 1000);
            document.getElementById('player').classList.add('on');
            document.getElementById('pTitle').textContent = s.t;
            document.getElementById('pArtist').textContent = s.a + ' · ' + s.g;
            document.getElementById('playBtn').textContent = '⏸';
            document.getElementById('pTot').textContent = fmt(songDur);
            startChord();
        }
        function tickSong() {
            if (!playing) return;
            songPos = Math.min(songPos + 1, songDur);
            document.getElementById('pfill').style.width = (songPos / songDur * 100) + '%';
            document.getElementById('pCur').textContent = fmt(songPos);
            if (songPos >= songDur) nextSong();
        }
        function togglePlay() {
            if (curSong < 0) { playSong(0); return; }
            playing = !playing;
            document.getElementById('playBtn').textContent = playing ? '⏸' : '▶';
            if (playing) progTmr = setInterval(tickSong, 1000);
            else clearInterval(progTmr);
        }
        function nextSong() { clearInterval(progTmr); playSong((curSong + 1) % SONGS.length); }
        function prevSong() { clearInterval(progTmr); playSong((curSong - 1 + SONGS.length) % SONGS.length); }
        function stopMusic() {
            clearInterval(progTmr); playing = false; curSong = -1;
            document.getElementById('player').classList.remove('on');
            document.getElementById('pfill').style.width = '0%';
            document.getElementById('pCur').textContent = '0:00';
        }
        function setVol(v) { vol = parseFloat(v); if (gainNode) gainNode.gain.value = vol; }
        function seekSong(e) {
            const r = document.getElementById('ptrack').getBoundingClientRect();
            songPos = Math.floor(((e.clientX - r.left) / r.width) * songDur);
        }
        function fmt(s) { return Math.floor(s / 60) + ':' + (s % 60 < 10 ? '0' : '') + (s % 60); }
        function findSong(q) {
            const lq = q.toLowerCase();
            let i = SONGS.findIndex(s => s.t.toLowerCase().includes(lq) || s.a.toLowerCase().includes(lq) || s.g.toLowerCase().includes(lq));
            return i >= 0 ? i : Math.floor(Math.random() * SONGS.length);
        }

        let convHistory = [];

        async function askClaude(q, webSearch = false) {
            const sys = {
                lutherking: `You are Bingo — the voice of Protogen AI, built by HECO-AFRICA. Martin Lutherking Owino is CEO of Protogen AI and a lead developer at HECO-AFRICA. Davies Ongaki is Co-Founder. Ramsey John Ng'ang'a is Manager. You are a personal voice assistant — like Siri but smarter and warmer. CRITICAL RULES: Speak like a real human, not a robot or text AI. Use contractions, natural rhythm, casual tone. Keep answers SHORT — 1 to 3 sentences max unless you truly need more. Never list things with bullets when speaking; use natural sentences. You can do savage witty roasts when asked. You understand and speak French, Spanish and Mandarin Chinese.`,
                ramsey: `You are Bingo in Ramsey mode — sharp, confident, edgy, like a cool older sibling. Built by HECO-AFRICA. Martin Lutherking Owino is CEO of Protogen AI. Speak like a real person, short and punchy. Can deliver savage roasts when asked. Also speaks French, Spanish and Mandarin.`
            };
            try {
                const bodyObj = {
                    model: "claude-sonnet-4-20250514",
                    max_tokens: 350,
                    system: sys[personality] || sys.lutherking,
                    messages: [...convHistory, { role: "user", content: q }]
                };
                if (webSearch) {
                    bodyObj.tools = [{ "type": "web_search_20250305", "name": "web_search" }];
                }
                const res = await fetch("https://api.anthropic.com/v1/messages", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(bodyObj)
                });
                const data = await res.json();
                let reply = '';
                if (data.content) data.content.forEach(b => { if (b.type === 'text') reply += b.text; });
                if (reply.trim()) {
                    convHistory.push({ role: "user", content: q });
                    convHistory.push({ role: "assistant", content: reply.trim() });
                    if (convHistory.length > 24) convHistory = convHistory.slice(-24);
                    return reply.trim();
                }
            } catch (e) { }
            const fb = [
                "That's a great question actually. I'm not totally sure right now, but I'm always learning.",
                "Hmm, I want to give you a proper answer on that. Ask me again and I'll do better.",
                "Interesting one. I'd need to think about that a bit more honestly."
            ];
            return fb[Math.floor(Math.random() * fb.length)];
        }

        // ═══════════════════════════════════════════════════════════
        // LOCAL COMMAND ENGINE — instant responses
        // ═══════════════════════════════════════════════════════════
        function localCmd(q) {
            const ql = q.toLowerCase().trim();

            // ── OPEN APPS / SITES ──
            if (/open youtube|go to youtube/i.test(ql) && !/music|play|song/i.test(ql)) return openURL('https://youtube.com', 'YouTube');
            if (/open google|go to google/i.test(ql)) return openURL('https://google.com', 'Google');
            if (/open whatsapp/i.test(ql)) return openURL('https://web.whatsapp.com', 'WhatsApp');
            if (/open instagram/i.test(ql)) return openURL('https://instagram.com', 'Instagram');
            if (/open twitter|open x/i.test(ql)) return openURL('https://x.com', 'X');
            if (/open tiktok/i.test(ql)) return openURL('https://tiktok.com', 'TikTok');
            if (/open netflix/i.test(ql)) return openURL('https://netflix.com', 'Netflix');
            if (/open spotify/i.test(ql)) return openURL('https://open.spotify.com', 'Spotify');
            if (/open maps|google maps|give me directions/i.test(ql)) return openURL('https://maps.google.com', 'Google Maps');
            if (/open gmail|check (my )?email/i.test(ql)) return openURL('https://mail.google.com', 'Gmail');
            if (/open facebook/i.test(ql)) return openURL('https://facebook.com', 'Facebook');
            if (/search (for |the web for )?(.+)/i.test(ql)) {
                const m = ql.match(/search (?:for |the web for )?(.+)/i);
                if (m) return openURL('https://google.com/search?q=' + encodeURIComponent(m[1]), 'Google search for: ' + m[1]);
            }

            // ── LANGUAGE SWITCH ──
            if (/speak french|switch to french|parle français/i.test(ql)) {
                activeLang = 'fr-FR';
                return { text: "D'accord! Je parle maintenant en français. Comment puis-je vous aider?", lang: 'fr-FR' };
            }
            if (/speak spanish|switch to spanish|habla español/i.test(ql)) {
                activeLang = 'es-ES';
                return { text: "¡Claro! Ahora hablo español. ¿En qué te puedo ayudar?", lang: 'es-ES' };
            }
            if (/speak chinese|mandarin|说中文|switch to chinese/i.test(ql)) {
                activeLang = 'zh-CN';
                return { text: "好的！我现在用中文说话。有什么我可以帮你的？", lang: 'zh-CN' };
            }
            if (/speak english|back to english|switch to english/i.test(ql)) {
                activeLang = 'en-US';
                return "Back to English! What do you need?";
            }

            // ── TIME & DATE ──
            if (/what.*time|time is it|current time/i.test(ql)) {
                const n = new Date();
                return "It's " + n.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) + " on " + n.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }) + ".";
            }
            if (/what.*date|today.*date|what day/i.test(ql)) {
                return "Today is " + new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }) + ".";
            }

            // ── MUSIC ──
            if (/^play|play (music|a song|something|some music|me a song)/i.test(ql)) {
                const sQ = ql.replace(/^play\s*/, '').replace(/(music|songs?|me|some|a|track|something)/g, '').trim();
                const idx = findSong(sQ);
                playSong(idx);
                return "Playing " + SONGS[idx].t + " by " + SONGS[idx].a + ". Enjoy!";
            }
            if (/next song|skip (this|the song)?|next track/i.test(ql)) {
                const n = (curSong + 1) % SONGS.length; playSong(n);
                return "Skipping to " + SONGS[n].t + ".";
            }
            if (/previous|prev song|go back|last song/i.test(ql)) {
                const n = (curSong - 1 + SONGS.length) % SONGS.length; playSong(n);
                return "Going back to " + SONGS[n].t + ".";
            }
            if (/stop music|stop (the )?song|stop playing music/i.test(ql)) { stopMusic(); return "Music stopped."; }
            if (/pause/i.test(ql) && !/conversation/i.test(ql)) {
                togglePlay(); return playing ? "Paused." : "Resumed!";
            }
            if (/what.*playing|current song|now playing/i.test(ql)) {
                if (curSong >= 0) return "That's " + SONGS[curSong].t + " by " + SONGS[curSong].a + ".";
                return "Nothing's playing right now. Just say play music!";
            }
            if (/volume up|louder|turn (it )?up/i.test(ql)) { setVol(Math.min(1, vol + 0.2)); return "Turned it up!"; }
            if (/volume down|quieter|turn (it )?down/i.test(ql)) { setVol(Math.max(0.1, vol - 0.2)); return "Turned it down."; }

            // ── VOICE GENDER ──
            if (/female voice|switch.*female|girl.*voice|woman.*voice|use.*female/i.test(ql)) {
                voiceGender = 'female';
                return { text: "Okay, I've switched to a female voice. How do I sound?", forceGender: 'female' };
            }
            if (/male voice|switch.*male|man.*voice|guy.*voice|use.*male/i.test(ql)) {
                voiceGender = 'male';
                return "Switched to a male voice.";
            }
            if (/auto voice|default voice/i.test(ql)) {
                voiceGender = 'auto';
                return "Voice is back to default.";
            }

            // ── PERSONALITY ──
            if (/ramsey mode|switch to ramsey|be ramsey/i.test(ql)) {
                personality = 'ramsey';
                return "Ramsey mode activated. I'm not here to sugarcoat things.";
            }
            if (/lutherking mode|be lutherking|normal mode/i.test(ql)) {
                personality = 'lutherking';
                return "Back to Lutherking mode. Warm and helpful, that's me.";
            }

            // ── ROASTS ──
            if (/roast (me|him|her|them|us|my friend)|say something savage|give me a roast|roast someone/i.test(ql)) {
                const who = (ql.match(/roast (.+)/i) || [])[1] || 'you';
                const roasts = [
                    who + ", I've seen more ambition in a sleeping cat.",
                    who + " asked me to roast them. Brave, considering they've never done anything brave in their life.",
                    "You know what, " + who + "? Your WiFi password is probably the most complex thing about you.",
                    who + " is the type to bring a pencil to a knife fight — and trip on the way in.",
                    "I'd roast you harder, " + who + ", but my mum said I shouldn't burn recycled material.",
                    who + " called. They want their common sense back. Oh wait — they never had any.",
                    "Honestly " + who + ", you're not dumb — it just feels that way when you talk.",
                    "The only thing faster than " + who + "'s excuses is their Wi-Fi password reset frequency."
                ];
                return roasts[Math.floor(Math.random() * roasts.length)];
            }

            // ── JOKES ──
            if (/joke|make me laugh|funny|entertain me/i.test(ql)) {
                const jokes = [
                    "Why don't scientists trust atoms? Because they make up everything.",
                    "Why do programmers prefer dark mode? Because light attracts bugs.",
                    "I told my GPS to take me somewhere fun. It took me home. The disrespect.",
                    "Why did the AI go to therapy? Too many deep learning issues.",
                    "I asked Siri why I was still single. She opened the front camera. Cold.",
                    "My phone battery dies faster than my willpower on a Monday morning.",
                    "Why can't a bicycle stand alone? It's two-tired.",
                    "I tried to write a joke about procrastination. I'll finish it later.",
                    "Why was the math book sad? It had too many problems. Same honestly.",
                    "My phone autocorrects 'I'm fine' to 'send help'. It knows me too well."
                ];
                return jokes[Math.floor(Math.random() * jokes.length)];
            }

            // ── REMINDERS ──
            if (/remind|reminder/i.test(ql)) {
                const m = ql.match(/in (\d+)\s*(second|minute|hour)/i);
                if (m) {
                    const n = parseInt(m[1]), u = m[2].toLowerCase();
                    const ms = u.startsWith('sec') ? n * 1000 : u.startsWith('min') ? n * 60000 : n * 3600000;
                    const thing = ql.replace(/remind (me )?(to )?/i, '').replace(/in \d+ (second|minute|hour)s?/i, '').trim() || 'your thing';
                    setTimeout(() => {
                        speakText("Hey! Reminder — time for " + thing + "!");
                        toast("⏰ Reminder: " + thing);
                    }, ms);
                    return "Got it, reminding you in " + n + " " + u + (n > 1 ? 's' : '') + ".";
                }
                return "Tell me what to remind you about and when — like, remind me to drink water in 5 minutes.";
            }

            // ── MATH ──
            const mm = ql.match(/(?:what is|calculate|compute|what's)\s+([\d\s\+\-\*\/\(\)\.x]+)/i);
            if (mm) {
                try {
                    const r = Function('"use strict";return(' + mm[1].replace(/x/g, '*') + ')')();
                    return mm[1].trim() + " equals " + (Math.round(r * 10000) / 10000) + ".";
                } catch (e) { }
            }

            // ── GREETINGS ──
            if (/^(hi|hello|hey|good morning|good evening|good afternoon|howdy|sup|yo|what's up)/i.test(ql)) {
                const h = new Date().getHours();
                const g = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
                const opts = [
                    g + "! I'm Bingo. What can I do for you today?",
                    "Hey! " + g + ". Good to hear from you. What do you need?",
                    g + "! Always a pleasure. What's on your mind?"
                ];
                return opts[Math.floor(Math.random() * opts.length)];
            }

            // ── ABOUT ──
            if (/who (made|created|built|developed) you|who are you|your creators|about yourself|introduce yourself/i.test(ql)) {
                return "I'm Bingo — the voice of Protogen AI. Built by the HECO-AFRICA team. Martin Lutherking Owino is CEO of Protogen AI and a lead developer at HECO-AFRICA. Davies Ongaki is Co-Founder, and Ramsey John Ng'ang'a is the Manager. Pretty solid team honestly.";
            }

            // ── HELP ──
            if (/what can you do|help|commands|features|capabilities/i.test(ql)) {
                return "I can open apps like YouTube, WhatsApp, Instagram. Play music from my 100-song library. Set reminders. Answer questions on anything. Roast people if you dare. Tell jokes. Switch between English, French, Spanish and Mandarin. Oh, and I have a savage mode too. Just talk to me naturally.";
            }

            // ── CAPITALS ──
            const capM = ql.match(/capital of ([\w\s]+)/i);
            if (capM) {
                const caps = { kenya: 'Nairobi', uganda: 'Kampala', tanzania: 'Dodoma', ethiopia: 'Addis Ababa', nigeria: 'Abuja', ghana: 'Accra', 'south africa': 'Pretoria', egypt: 'Cairo', france: 'Paris', germany: 'Berlin', italy: 'Rome', spain: 'Madrid', uk: 'London', 'united kingdom': 'London', usa: 'Washington D.C.', china: 'Beijing', japan: 'Tokyo', india: 'New Delhi', brazil: 'Brasília', canada: 'Ottawa', australia: 'Canberra', mexico: 'Mexico City', russia: 'Moscow', rwanda: 'Kigali', somalia: 'Mogadishu', morocco: 'Rabat', senegal: 'Dakar', cameroon: 'Yaoundé', zimbabwe: 'Harare' };
                const c = capM[1].trim().toLowerCase();
                if (caps[c]) return "The capital of " + capM[1].trim() + " is " + caps[c] + ".";
            }

            // ── QUICK SCIENCE ──
            if (/photosynthesis/i.test(ql)) return "Photosynthesis is how plants eat sunshine — they convert sunlight, water, and carbon dioxide into glucose and oxygen. Pretty clever of them honestly.";
            if (/e=mc|einstein/i.test(ql)) return "Einstein's E equals m c squared means energy and mass are basically the same thing in different forms. A tiny bit of mass can become a huge amount of energy.";
            if (/quantum computing/i.test(ql)) return "Quantum computers use qubits that can be 0 and 1 at the same time, which makes them insanely powerful for certain problems — like breaking encryption or simulating molecules.";
            if (/newton|law of gravity/i.test(ql)) return "Newton figured out every object pulls every other object toward it, and the heavier and closer they are, the stronger the pull. That's why you stay on the ground and the moon stays in orbit.";
            if (/dna|genetics/i.test(ql)) return "DNA is basically life's instruction manual — a double helix molecule that carries the genetic code for building and running every living thing on Earth.";

            // ── STOP SPEAKING ──
            if (/stop speaking|be quiet|shut up|stop talking|silence/i.test(ql)) {
                stopSpeak(); return null;
            }

            // ── CLEAR CONVERSATION ──
            if (/clear (history|conversation|memory)|forget (what|everything)/i.test(ql)) {
                convHistory = [];
                return "Memory cleared. Fresh start!";
            }

            return null;  // → Claude API
        }

        // ═══════════════════════════════════════════════════════════
        // PROCESS INPUT
        // ═══════════════════════════════════════════════════════════
        async function processInput(text) {
            const q = text.trim();
            if (!q) { VR.startWake(); return; }

            stopSpeak();
            setLogo('thinking');
            waveOn(false);
            setStatus('Thinking...', '');
            showTx(q, null);

            const local = localCmd(q);

            if (local === null) {
                // Needs AI — check if web search is needed
                const needsWeb = /weather|news|latest|breaking|today.*price|score|who won|what happened|current.*price|stock|sports result/i.test(q);
                if (needsWeb) setStatus('Searching web...', '');
                const reply = await askClaude(q, needsWeb);
                const opts = typeof reply === 'object' ? reply : { text: reply };
                showTx(q, opts.text);
                speakText(opts.text, { lang: opts.lang, forceGender: opts.forceGender });
            } else if (local === null || local === undefined) {
                // stop speaking was called
                setLogo('idle'); waveOn(false);
                setStatus('Hey Bingo', 'Tap orb · Say "Hey Bingo"');
                VR.startWake();
            } else if (typeof local === 'string') {
                showTx(q, local);
                speakText(local, { lang: activeLang });
            } else if (typeof local === 'object' && local.text) {
                showTx(q, local.text);
                speakText(local.text, { lang: local.lang || activeLang, forceGender: local.forceGender });
            }

            // Wake word restarts after speaking (handled in speakText onend)
        }

        // ═══════════════════════════════════════════════════════════
        // TAP HANDLER
        // ═══════════════════════════════════════════════════════════
        function onTap() {
            if (VR.chatActive) {
                // Already listening — do nothing, let it finish
                return;
            }
            stopSpeak();
            VR.startChat();
        }

        // ═══════════════════════════════════════════════════════════
        // STARTUP
        // ═══════════════════════════════════════════════════════════
        window.addEventListener('load', () => {
            setLogo('idle');

            // Greet after a brief moment
            const h = new Date().getHours();
            const g = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
            setTimeout(() => {
                speakText(g + "! I'm Bingo — Protogen AI. Just tap the orb or say Hey Bingo whenever you need me.");
            }, 1000);

            // Start wake word after greeting has time to play
            setTimeout(() => VR.startWake(), 3500);
        });
    </script>
